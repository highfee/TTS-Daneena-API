<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Login Code</title>
  </head>
  <body
    style="
      font-family: Arial, sans-serif;
      background-color: #f9fafb;
      padding: 20px;
    "
  >
    <div
      style="
        max-width: 480px;
        margin: auto;
        background: #ffffff;
        padding: 24px;
        border-radius: 8px;
      "
    >
      <h2 style="color: #111827">Your Login Code</h2>

      <p>Hello,</p>

      <p>
        Use the verification code below to sign in. This code will expire in
        <strong>10 minutes</strong>.
      </p>

      <div
        style="
          font-size: 20px;
          font-weight: 600;
          letter-spacing: 4px;
          margin: 24px 0;
          color: #2563eb;
          max-width: 100%;
          text-align: center;
        "
      >
        {{ token }}
      </div>

      <p style="color: #6b7280; font-size: 14px">
        If you did not request this login, you can safely ignore this email.
      </p>

      <hr style="margin: 24px 0" />

      <p style="font-size: 12px; color: #9ca3af">
        © {{ year }} Daneena EA_TTS Engine. All rights reserved.
      </p>
    </div>
  </body>
</html>
